version: "3.9"

services:
  bedes-mikrotik-controller:
    build: .
    image: bedes-mikrotik-controller:latest
    container_name: bedes-mikrotik-controller
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      FRONTEND_DIST_DIR: /app/dist
    volumes:
      - ./data:/app/server/data
      - ./config.json:/app/config.json
    labels:
      - traefik.enable=true
      - traefik.docker.network=hosting-public
      - traefik.http.routers.bedes-mikrotik-controller-web.rule=Host(`${BEDES_DOMAIN}`)
      - traefik.http.routers.bedes-mikrotik-controller-web.entrypoints=web
      - traefik.http.routers.bedes-mikrotik-controller-web.middlewares=bedes-mikrotik-controller-https-redirect
      - traefik.http.middlewares.bedes-mikrotik-controller-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.bedes-mikrotik-controller-https-redirect.redirectscheme.permanent=true
      - traefik.http.routers.bedes-mikrotik-controller.rule=Host(`${BEDES_DOMAIN}`)
      - traefik.http.routers.bedes-mikrotik-controller.entrypoints=websecure
      - traefik.http.routers.bedes-mikrotik-controller.tls=true
      - traefik.http.routers.bedes-mikrotik-controller.tls.certresolver=letsencrypt
      - traefik.http.services.bedes-mikrotik-controller.loadbalancer.server.port=3000
    networks:
      - hosting-public

networks:
  hosting-public:
    external: true
    name: ${PUBLIC_NETWORK:-hosting-public}